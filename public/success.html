<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message Sent</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .box {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        text-align: center;
        max-width: 500px;
      }
      h1 {
        margin-bottom: 12px;
      }
      p {
        color: #475569;
        line-height: 1.7;
      }
      a {
        display: inline-block;
        margin-top: 18px;
        text-decoration: none;
        background: #0f172a;
        color: white;
        padding: 12px 18px;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Message sent successfully</h1>
      <p>Thank you for reaching out. I will get back to you soon.</p>
      <a href="/">Back to Home</a>
    </div>
  </body>
</html>
